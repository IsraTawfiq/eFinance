<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Power BI Report</title>

  <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>
  
  <style>
    body {
      margin: 0;
      background: #0f1117;
      color: white;
      font-family: Arial;
    }

    #reportContainer {
      height: 100vh;
    }

    #loading {
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
  </style>
</head>

<body>

<div id="loading">جاري تحميل التقرير...</div>
<div id="reportContainer"></div>

<script>
  async function getEmbedConfig() {
    const res = await fetch("https://efinance-b15w.onrender.com/embed");
    return await res.json();
  }

  async function embedReport() {
    const data = await getEmbedConfig();

    document.getElementById("loading").style.display = "none";

    const models = window["powerbi-client"].models;

    const config = {
      type: "report",
      id: data.reportId,
      embedUrl: data.embedUrl,
      accessToken: data.embedToken,
      tokenType: models.TokenType.Embed
    };

    powerbi.embed(document.getElementById("reportContainer"), config);
  }

  embedReport();
</script>

</body>
</html>
